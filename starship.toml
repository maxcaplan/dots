# Get editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"

# Inserts a blank line between shell prompts
add_newline = true

format = """$all"""

[username]
format = "[$user]($style): "
show_always = true

[directory]
truncation_symbol = "έΑο/"
read_only = " ≤░Ν╛"

[battery]
full_symbol = "≤░Β╣ "
charging_symbol = "≤░ΓΕ "
discharging_symbol = "≤░ΓΔ "
unknown_symbol = "≤░ΓΣ "
empty_symbol = "≤░ΓΟ "

[cmd_duration]
format = '\([$duration]($style)\) '

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = "ΎΡα "

[git_commit]
tag_symbol = " ΎΡΤ "

[git_status]
conflicted = "Ό┐Μ"
ahead = "ΎΖ╢"
behind = "ΎΖ╡"
diverged = "ΎΒ╜"
untracked = "ΎΕρ"
stashed = "ΎΖΧ"
modified = "ΎΕς"
staged = "ΎΒπ"
renamed = "ΎΕΒ"
deleted = "ΎΑΞ"

[hostname]
format = "[$ssh_symbol$hostname]($style): "
ssh_symbol = "ΌυΒ "

[memory_usage]
symbol = "≤░Ξδ "
disabled = true

[package]
format = "[$symbol($version )]($style)"
version_format = "${raw}"
symbol = "≤░ΠΩ "

