# Get editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"

# Inserts a blank line between shell prompts
add_newline = true

format = """$username$hostname:$all"""

[username]
format = "[$user]($style)"
show_always = true

[hostname]
format = "@[$hostname]($style)"
ssh_symbol = " ¯¼ü "

[shell]
format = "[$indicator]($style)"
fish_indicator = ""
bash_indicator = "bsh "
zsh_indicator = "zsh "
powershell_indicator = "psh "
pwsh_indicator = "psh "
ion_indicator = "ion "
elvish_indicator = "esh "
tcsh_indicator = "tsh "
xonsh_indicator = "xsh "
cmd_indicator = "cmd "
nu_indicator = "nu "
style = "purple bold"
disabled = false

[directory]
